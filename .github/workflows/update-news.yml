name: Update News Daily

permissions:                                                                     
       contents: write   
on:
  schedule:
    # 每天 UTC 00:00 运行 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Update news data
        run: node scripts/update-news.js
        
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update news data"
          git push
          
      - name: Trigger Netlify deploy
        if: success()
        run: |
          curl -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}" || true