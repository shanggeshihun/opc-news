name: Update News Daily

on:
  schedule:
    # 每天 UTC 00:00 运行 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发
  push:  # 推送时也触发（用于测试和修复）
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Update news data
        run: node scripts/update-news.js
        
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update news data"
          git push

  deploy-to-cloudbase:
    runs-on: ubuntu-latest
    needs: update-news
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli
        
      - name: Deploy to CloudBase
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
        run: |
          tcb login --apiSecretId $TENCENT_SECRET_ID --apiSecretKey $TENCENT_SECRET_KEY
          tcb framework deploy -e $CLOUDBASE_ENV_ID